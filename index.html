<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RidePlan Pro | Fullscreen Routing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root { --biker-orange: #ff9800; --biker-dark: #09090b; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; }
        
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; }
        .leaflet-tile-pane { filter: brightness(0.6) contrast(1.2) saturate(0.6); }

        /* Floating Sidebar Styling */
        .floating-sidebar {
            position: absolute;
            top: 20px;
            left: 20px;
            bottom: 20px;
            width: 420px;
            z-index: 1000;
            background: rgba(12, 12, 14, 0.85);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-collapsed { transform: translateX(-440px); }

        .collapse-btn {
            position: absolute;
            right: -50px;
            top: 20px;
            width: 40px;
            height: 40px;
            background: var(--biker-orange);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,152,0,0.3);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,152,0,0.3); border-radius: 10px; }
        
        .tab-btn.active { color: var(--biker-orange); border-bottom: 2px solid var(--biker-orange); }
        
        .waypoint-badge { 
            background: var(--biker-orange); color: black; border-radius: 50%; width: 28px; height: 28px; 
            display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; 
            border: 2px solid #000; box-shadow: 0 0 15px rgba(255,152,0,0.6); 
        }
        .waypoint-badge.start { background: #22c55e; box-shadow: 0 0 15px rgba(34,197,94,0.6); }
        .waypoint-badge.end { background: #ef4444; box-shadow: 0 0 15px rgba(239,68,68,0.6); }

        .poi-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); transition: all 0.2s; }
        .poi-card:hover { background: rgba(255,255,255,0.07); border-color: var(--biker-orange); }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Schwebende Sidebar -->
    <aside id="sidebar" class="floating-sidebar">
        <!-- Toggle Button -->
        <div class="collapse-btn" onclick="toggleSidebar()">
            <i data-lucide="chevron-left" id="toggle-icon" class="text-black w-5 h-5"></i>
        </div>

        <!-- Header -->
        <div class="p-6 border-b border-white/10">
            <div class="flex items-center gap-3 mb-4">
                <div class="bg-orange-600 p-2 rounded-lg">
                    <i data-lucide="map-pin" class="text-black w-5 h-5"></i>
                </div>
                <h1 class="text-xl font-black tracking-tighter uppercase italic text-white">RidePlan <span class="text-orange-500">Pro</span></h1>
            </div>

            <!-- Global Status -->
            <div id="status-bar" class="hidden flex items-center gap-3 p-3 bg-orange-500/10 rounded-xl border border-orange-500/20">
                <div class="w-3 h-3 border-2 border-orange-500 border-t-transparent rounded-full animate-spin"></div>
                <span id="status-text" class="text-[10px] font-black uppercase text-orange-500 tracking-widest">Berechne...</span>
            </div>
        </div>

        <!-- Navigation Tabs -->
        <div class="flex border-b border-white/5 bg-black/20">
            <button onclick="switchTab('plan')" id="tab-plan" class="tab-btn active flex-1 py-4 text-[10px] font-black uppercase tracking-widest text-zinc-400">Route</button>
            <button onclick="switchTab('detail')" id="tab-detail" class="tab-btn flex-1 py-4 text-[10px] font-black uppercase tracking-widest text-zinc-400">Entdeckungen</button>
        </div>

        <!-- Scroll Content -->
        <div class="flex-1 overflow-y-auto custom-scrollbar p-6">
            
            <!-- PANEL: ROUTING -->
            <div id="panel-plan" class="space-y-8">
                <div class="space-y-4">
                    <div class="relative">
                        <input id="start-input" oninput="searchLoc(this, 'start-res')" type="text" placeholder="Startpunkt..." class="w-full bg-white/5 border border-white/10 rounded-xl p-4 pl-10 text-sm text-white focus:border-orange-500 outline-none transition-all">
                        <i data-lucide="play" class="absolute left-3 top-4 w-4 h-4 text-green-500"></i>
                        <div id="start-res" class="hidden absolute left-0 right-0 z-[1001] bg-zinc-900 border border-white/10 rounded-xl mt-1 max-h-48 overflow-auto shadow-2xl"></div>
                    </div>
                    <div class="relative">
                        <input id="end-input" oninput="searchLoc(this, 'end-res')" type="text" placeholder="Zielort..." class="w-full bg-white/5 border border-white/10 rounded-xl p-4 pl-10 text-sm text-white focus:border-orange-500 outline-none transition-all">
                        <i data-lucide="flag" class="absolute left-3 top-4 w-4 h-4 text-red-500"></i>
                        <div id="end-res" class="hidden absolute left-0 right-0 z-[1001] bg-zinc-900 border border-white/10 rounded-xl mt-1 max-h-48 overflow-auto shadow-2xl"></div>
                    </div>
                </div>

                <div id="waypoints-list" class="space-y-3">
                    <!-- Waypoints werden hier injiziert -->
                </div>

                <button onclick="runAdvancedRouting()" class="w-full py-4 bg-orange-600 hover:bg-orange-500 text-black font-black uppercase tracking-widest rounded-xl transition-all shadow-lg shadow-orange-900/20 active:scale-95">
                    Tour berechnen
                </button>
                
                <div id="error-message" class="hidden p-4 bg-red-900/20 border border-red-500/50 rounded-xl text-red-400 text-[11px] font-bold"></div>
            </div>

            <!-- PANEL: DISCOVERIES -->
            <div id="panel-detail" class="hidden space-y-6">
                <div id="pois-results" class="space-y-8">
                    <p class="text-center text-zinc-500 text-xs py-10 uppercase font-black">Berechne zuerst eine Route</p>
                </div>
            </div>
        </div>

        <!-- Footer Actions -->
        <div class="p-4 border-t border-white/10 bg-black/40 rounded-b-3xl">
            <button onclick="downloadGPX()" id="gpx-btn" class="hidden w-full flex items-center justify-center gap-2 bg-zinc-800 hover:bg-zinc-700 text-white py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">
                <i data-lucide="download" class="w-4 h-4"></i> GPX Datei Speichern
            </button>
        </div>
    </aside>

    <!-- Floating Stats (Top Right) -->
    <div id="route-stats" class="hidden absolute top-6 right-6 z-[900] glass p-6 rounded-3xl border border-white/10 min-w-[240px] shadow-2xl animate-fade">
        <div class="flex items-center gap-4 mb-4">
            <div class="bg-orange-600 p-3 rounded-xl">
                <i data-lucide="navigation" class="text-black w-5 h-5"></i>
            </div>
            <div>
                <p class="text-[9px] text-zinc-500 uppercase font-black">Gesamtstrecke</p>
                <p id="stat-dist" class="text-2xl font-black italic text-white">0.0 km</p>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-4 pt-4 border-t border-white/5">
            <div>
                <p class="text-[9px] text-zinc-500 uppercase font-black">Fahrzeit</p>
                <p id="stat-time" class="font-bold text-zinc-200 text-xs">--</p>
            </div>
            <div>
                <p class="text-[9px] text-zinc-500 uppercase font-black">Höhenmeter</p>
                <p id="stat-ele" class="font-bold text-zinc-200 text-xs">--</p>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImY3NDc2NTk5YTI3MzRiZDRiZjBmYjg4YmE1ZTZiYzgwIiwiaCI6Im11cm11cjY0In0=";
        let map, routeLayer;
        let waypoints = [];
        let fullRouteGeojson = null;

        function init() {
            lucide.createIcons();
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([47.3769, 8.5417], 7);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            map.on('contextmenu', (e) => {
                addWaypoint([e.latlng.lng, e.latlng.lat], `Stopp ${waypoints.length + 1}`);
            });
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const icon = document.getElementById('toggle-icon');
            sidebar.classList.toggle('sidebar-collapsed');
            icon.style.transform = sidebar.classList.contains('sidebar-collapsed') ? 'rotate(180deg)' : 'rotate(0deg)';
        }

        async function searchLoc(el, resId) {
            const query = el.value.trim();
            const div = document.getElementById(resId);
            if(query.length < 3) { div.classList.add('hidden'); return; }

            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5`);
                const data = await res.json();
                div.innerHTML = data.map(item => `
                    <div onclick="selectLocation('${resId}', '${item.display_name.split(',')[0]}', [${item.lat}, ${item.lon}])" 
                         class="p-4 text-xs border-b border-white/5 hover:bg-orange-600 hover:text-black cursor-pointer transition-all font-bold text-zinc-300">
                        ${item.display_name}
                    </div>
                `).join('');
                div.classList.remove('hidden');
            } catch(e) {}
        }

        function selectLocation(resId, name, coords) {
            const isStart = resId.includes('start');
            const pt = [coords[1], coords[0]];
            if(isStart) {
                if(waypoints.length > 0 && waypoints[0].isStart) waypoints.shift();
                waypoints.unshift({coords: pt, name: name, isStart: true});
            } else {
                if(waypoints.length > 0 && waypoints[waypoints.length-1].isEnd) waypoints.pop();
                waypoints.push({coords: pt, name: name, isEnd: true});
            }
            document.getElementById(resId.includes('start') ? 'start-input' : 'end-input').value = name;
            document.getElementById(resId).classList.add('hidden');
            refreshMapMarkers();
            if(waypoints.length >= 2) runAdvancedRouting();
        }

        function addWaypoint(coords, name) {
            if(waypoints.length >= 2 && waypoints[waypoints.length-1].isEnd) {
                waypoints.splice(waypoints.length - 1, 0, {coords, name});
            } else {
                waypoints.push({coords, name});
            }
            refreshMapMarkers();
            if(waypoints.length >= 2) runAdvancedRouting();
        }

        function refreshMapMarkers() {
            map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });
            waypoints.forEach((wp, i) => {
                const isStart = i === 0 && wp.isStart;
                const isEnd = i === waypoints.length - 1 && wp.isEnd;
                L.marker([wp.coords[1], wp.coords[0]], {
                    draggable: true,
                    icon: L.divIcon({
                        className: 'custom-icon',
                        html: `<div class="waypoint-badge ${isStart?'start':(isEnd?'end':'')}">${i+1}</div>`,
                        iconSize: [28, 28],
                        iconAnchor: [14, 14]
                    })
                }).addTo(map).on('dragend', (e) => {
                    const pos = e.target.getLatLng();
                    waypoints[i].coords = [pos.lng, pos.lat];
                    runAdvancedRouting();
                });
            });
            updateWaypointsUI();
        }

        function updateWaypointsUI() {
            const list = document.getElementById('waypoints-list');
            list.innerHTML = "";
            waypoints.forEach((wp, i) => {
                const item = document.createElement('div');
                let segmentStats = (i > 0 && wp.segment) ? `
                    <div class="ml-6 mb-2 border-l-2 border-orange-500/20 pl-4 py-2">
                        <span class="text-[9px] font-black text-orange-500 bg-orange-500/10 px-2 py-1 rounded">
                            ${wp.segment.dist} km • ${wp.segment.time} Min • ▲ ${wp.segment.ele}m
                        </span>
                    </div>` : "";

                item.innerHTML = `${segmentStats}
                    <div class="flex items-center justify-between p-4 bg-white/5 border border-white/5 rounded-2xl group">
                        <div class="flex items-center gap-3">
                            <span class="text-[10px] font-black text-zinc-600">${i+1}</span>
                            <p class="text-[11px] font-bold text-zinc-300 truncate max-w-[200px]">${wp.name || 'Stopp'}</p>
                        </div>
                        <button onclick="removeWaypoint(${i})" class="text-zinc-600 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>`;
                list.appendChild(item);
            });
            lucide.createIcons();
        }

        function removeWaypoint(i) {
            waypoints.splice(i, 1);
            refreshMapMarkers();
            if(waypoints.length >= 2) runAdvancedRouting();
        }

        async function runAdvancedRouting() {
            if(waypoints.length < 2) return;
            const status = document.getElementById('status-bar');
            const statusText = document.getElementById('status-text');
            const errorBox = document.getElementById('error-message');
            
            status.classList.remove('hidden');
            errorBox.classList.add('hidden');
            
            let allCoords = [], totalDist = 0, totalTime = 0, totalEle = 0;

            try {
                for(let i = 0; i < waypoints.length - 1; i++) {
                    statusText.innerText = `Etappe ${i+1}...`;
                    const res = await fetch(`https://api.openrouteservice.org/v2/directions/driving-car/geojson`, {
                        method: 'POST',
                        headers: { 'Authorization': API_KEY, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ coordinates: [waypoints[i].coords, waypoints[i+1].coords], elevation: true })
                    });
                    
                    if (!res.ok) throw new Error(`API Fehler bei Etappe ${i+1}.`);
                    
                    const data = await res.json();
                    
                    // VALIDIERUNG: Prüfen ob Features existieren
                    if (!data.features || data.features.length === 0) {
                        throw new Error(`Keine Route zwischen ${waypoints[i].name || 'Punkt '+(i+1)} und ${waypoints[i+1].name || 'Punkt '+(i+2)} gefunden.`);
                    }

                    const feature = data.features[0];
                    if (!feature.geometry || !feature.geometry.coordinates) {
                        throw new Error(`Ungültige Geometrie in Etappe ${i+1}.`);
                    }

                    const props = feature.properties.summary;
                    waypoints[i+1].segment = {
                        dist: (props.distance / 1000).toFixed(1),
                        time: Math.round(props.duration / 60),
                        ele: Math.round(feature.properties.ascent || 0)
                    };
                    totalDist += props.distance;
                    totalTime += props.duration;
                    totalEle += (feature.properties.ascent || 0);
                    allCoords = [...allCoords, ...feature.geometry.coordinates];
                }

                fullRouteGeojson = { type: "Feature", geometry: { type: "LineString", coordinates: allCoords } };
                if(routeLayer) map.removeLayer(routeLayer);
                routeLayer = L.geoJSON(fullRouteGeojson, { style: { color: '#ff9800', weight: 6, opacity: 0.9 } }).addTo(map);

                document.getElementById('stat-dist').innerText = `${(totalDist / 1000).toFixed(1)} km`;
                document.getElementById('stat-time').innerText = `${Math.floor(totalTime / 3600)}h ${Math.round((totalTime % 3600) / 60)}m`;
                document.getElementById('stat-ele').innerText = `+${Math.round(totalEle)}m`;

                map.fitBounds(routeLayer.getBounds(), { padding: [100, 100] });
                document.getElementById('route-stats').classList.remove('hidden');
                document.getElementById('gpx-btn').classList.remove('hidden');
                updateWaypointsUI();
                renderPois();
            } catch(e) {
                console.error(e);
                errorBox.innerText = e.message;
                errorBox.classList.remove('hidden');
                // Stats verstecken bei Fehler
                document.getElementById('route-stats').classList.add('hidden');
            } finally {
                status.classList.add('hidden');
            }
        }

        function renderPois() {
            const container = document.getElementById('pois-results');
            container.innerHTML = "";
            waypoints.forEach((wp, i) => {
                const section = document.createElement('div');
                section.className = "animate-fade space-y-4";
                section.innerHTML = `
                    <div class="flex items-center gap-3 border-b border-white/10 pb-2">
                        <span class="bg-orange-600 text-black font-black w-6 h-6 rounded text-[10px] flex items-center justify-center">${i+1}</span>
                        <h3 class="text-xs font-black uppercase italic text-white">${wp.name || 'Wegpunkt'}</h3>
                    </div>
                    <div class="grid gap-2">
                        <div class="poi-card p-4 rounded-2xl">
                            <p class="text-[10px] font-black text-orange-500 uppercase mb-1">Empfehlung</p>
                            <p class="text-[11px] font-bold text-white">Hotel Belvedere ${wp.name || ''}</p>
                            <p class="text-[9px] text-zinc-500">Zentrumsnah • Garage • 4.5 ★</p>
                        </div>
                        <div class="poi-card p-4 rounded-2xl">
                            <p class="text-[10px] font-black text-green-500 uppercase mb-1">Restaurant</p>
                            <p class="text-[11px] font-bold text-white">Local Grill & Bar</p>
                            <p class="text-[9px] text-zinc-500">Regionale Spezialitäten</p>
                        </div>
                    </div>`;
                container.appendChild(section);
            });
            lucide.createIcons();
        }

        function switchTab(t) {
            document.getElementById('tab-plan').classList.toggle('active', t==='plan');
            document.getElementById('tab-detail').classList.toggle('active', t==='detail');
            document.getElementById('panel-plan').classList.toggle('hidden', t!=='plan');
            document.getElementById('panel-detail').classList.toggle('hidden', t!=='detail');
        }

        function downloadGPX() {
            if(!fullRouteGeojson) return;
            let gpx = `<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1" creator="RidePlan"><trk><name>Tour</name><trkseg>`;
            fullRouteGeojson.geometry.coordinates.forEach(pt => gpx += `<trkpt lat="${pt[1]}" lon="${pt[0]}"></trkpt>`);
            gpx += `</trkseg></trk></gpx>`;
            const blob = new Blob([gpx], { type: 'application/gpx+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = "tour.gpx"; a.click();
        }

        window.onload = init;
    </script>
</body>
</html>
