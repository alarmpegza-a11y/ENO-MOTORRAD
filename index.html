<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RidePlan Pro | Interactive Selection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root { --biker-orange: #ff9800; --biker-dark: #09090b; }
        body { background-color: var(--biker-dark); color: #f4f4f5; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(18, 18, 21, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        #map { height: 100%; width: 100%; z-index: 1; background: #000; }
        .leaflet-tile-pane { filter: brightness(0.4) contrast(1.2) saturate(0.6); }
        .tab-btn.active { border-bottom: 2px solid var(--biker-orange); color: var(--biker-orange); }
        
        .selection-card { cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
        .selection-card.selected { border-color: var(--biker-orange); background: rgba(255,152,0,0.1); }
        
        input[type="range"] { -webkit-appearance: none; background: #333; height: 4px; border-radius: 2px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: var(--biker-orange); border: 2px solid #000; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="h-16 shrink-0 border-b border-white/10 px-6 flex items-center justify-between glass z-50">
        <div class="flex items-center gap-4">
            <div class="bg-orange-600 p-2 rounded-xl">
                <i data-lucide="map" class="text-black w-5 h-5"></i>
            </div>
            <h1 class="text-xl font-black tracking-tighter uppercase italic">RidePlan <span class="text-orange-500">Pro</span></h1>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden">
        <aside class="w-[480px] flex flex-col border-r border-white/10 bg-zinc-950/80 z-40">
            <div class="flex border-b border-white/10">
                <button onclick="switchTab('plan')" id="tab-plan" class="tab-btn active flex-1 py-4 text-[10px] font-black uppercase tracking-widest">Planung</button>
                <button onclick="switchTab('detail')" id="tab-detail" class="tab-btn flex-1 py-4 text-[10px] font-black uppercase tracking-widest">Reiseplan</button>
            </div>

            <div class="flex-1 overflow-y-auto custom-scrollbar">
                <!-- PANEL: PLANUNG -->
                <div id="panel-plan" class="p-6 space-y-8">
                    <section class="space-y-4">
                        <h2 class="text-[11px] font-black text-orange-500 uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="navigation-2" class="w-4 h-4"></i> Route
                        </h2>
                        <div class="space-y-3">
                            <div class="relative">
                                <input id="start-input" oninput="searchLoc(this, 'start-res')" type="text" placeholder="Start (z.B. München)..." class="w-full bg-zinc-900 border border-white/10 rounded-xl p-3 text-sm focus:border-orange-500 outline-none">
                                <div id="start-res" class="hidden absolute left-0 right-0 z-50 bg-zinc-900 border border-white/10 rounded-xl mt-1 max-h-60 overflow-auto shadow-2xl"></div>
                            </div>
                            <div class="relative">
                                <input id="end-input" oninput="searchLoc(this, 'end-res')" type="text" placeholder="Ziel (z.B. Gardasee)..." class="w-full bg-zinc-900 border border-white/10 rounded-xl p-3 text-sm focus:border-orange-500 outline-none">
                                <div id="end-res" class="hidden absolute left-0 right-0 z-50 bg-zinc-900 border border-white/10 rounded-xl mt-1 max-h-60 overflow-auto shadow-2xl"></div>
                            </div>
                        </div>
                    </section>

                    <section class="space-y-4">
                        <h2 class="text-[11px] font-black text-orange-500 uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="calendar" class="w-4 h-4"></i> Zeit & Verpflegung
                        </h2>
                        <div class="p-5 bg-zinc-900/50 border border-white/5 rounded-2xl space-y-6">
                            <div class="space-y-2">
                                <div class="flex justify-between text-[10px] font-bold uppercase">
                                    <span>Anzahl Tage</span>
                                    <span id="days-display" class="text-orange-500 font-black">3</span>
                                </div>
                                <input type="range" id="days-range" min="1" max="10" step="1" value="3" oninput="document.getElementById('days-display').innerText = this.value" class="w-full">
                            </div>
                            
                            <div class="flex items-center justify-between">
                                <span class="text-xs font-bold">Mahlzeiten pro Tag</span>
                                <select id="meal-count" class="bg-zinc-800 text-xs p-2 rounded-lg outline-none">
                                    <option value="1">1x Essen (Mittag)</option>
                                    <option value="2" selected>2x Essen (Mittag & Abend)</option>
                                </select>
                            </div>
                        </div>
                    </section>

                    <button onclick="generateTour()" class="w-full py-5 bg-orange-600 hover:bg-orange-500 text-black font-black uppercase tracking-widest rounded-2xl transition-all shadow-xl shadow-orange-900/20">
                        Tour generieren
                    </button>
                </div>

                <!-- PANEL: ERGEBNIS / REISEPLAN -->
                <div id="panel-detail" class="hidden">
                    <div id="tour-results" class="divide-y divide-white/10">
                        <p class="p-10 text-center text-zinc-500 uppercase text-[10px] font-black">Erstelle zuerst eine Route...</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Map Section -->
        <section class="flex-1 relative">
            <div id="map"></div>
        </section>
    </main>

    <script>
        // API Key für OpenRouteService
        const API_KEY = "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImY3NDc2NTk5YTI3MzRiZDRiZjBmYjg4YmE1ZTZiYzgwIiwiaCI6Im11cm11cjY0In0=";
        let map, routeLayer;
        let points = { start: null, end: null, sName: "", eName: "" };
        let currentTourData = null;
        let selections = {};
        let searchTimeout;

        // Fallback-Daten inklusive Madrid
        const FALLBACK_LOCATIONS = [
            { name: "München", lat: 48.1351, lon: 11.5820 },
            { name: "Madrid", lat: 40.4168, lon: -3.7038 },
            { name: "Barcelona", lat: 41.3851, lon: 2.1734 },
            { name: "Innsbruck", lat: 47.2692, lon: 11.4041 },
            { name: "Bozen", lat: 46.4983, lon: 11.3548 },
            { name: "Gardasee", lat: 45.6736, lon: 10.7062 }
        ];

        const MOCK_OPTIONS = {
            restaurant: [
                { id: 'r1', name: "Trattoria Al Biker", rating: 4.8, price: "€€", type: "Italienisch", addr: "Via Roma 12" },
                { id: 'r2', name: "Gasthof Alpenblick", rating: 4.2, price: "€", type: "Hausmannskost", addr: "Dorfstraße 5" },
                { id: 'r3', name: "Steakhouse Passhöhe", rating: 4.5, price: "€€€", type: "Grill", addr: "Passstraße 1" }
            ],
            hotel: [
                { id: 'h1', name: "Grand Hotel Panorama", rating: 4.9, price: "€€€", type: "Wellness & Spa", addr: "Höhenweg 45", avail: "Verfügbar" },
                { id: 'h2', name: "Biker-Motel 'Grip'", rating: 4.0, price: "€", type: "Zweckmäßig", addr: "Gewerbepark 2", avail: "Nur noch 2 Zimmer" },
                { id: 'h3', name: "Landhotel Post", rating: 4.4, price: "€€", type: "Traditionell", addr: "Marktplatz 1", avail: "Verfügbar" }
            ],
            sight: [
                { id: 's1', name: "Geheimer Wasserfall", rating: 4.7, price: "Gratis", type: "Natur", addr: "Waldpfad 3" },
                { id: 's2', name: "Oldtimer Museum", rating: 4.3, price: "12€", type: "Kultur", addr: "Industriestr. 9" },
                { id: 's3', name: "360° Skywalk", rating: 4.6, price: "8€", type: "Aussicht", addr: "Gipfelstation" }
            ]
        };

        function init() {
            lucide.createIcons();
            map = L.map('map', { zoomControl: false }).setView([47.5, 11.5], 7);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);
        }

        async function generateTour() {
            if(!points.start || !points.end) {
                alert("Bitte wähle Start und Ziel aus der Suchliste aus.");
                return;
            }
            switchTab('detail');
            const res = document.getElementById('tour-results');
            res.innerHTML = '<div class="p-20 text-center"><p class="animate-pulse text-orange-500 font-black italic uppercase">Berechne Route...</p></div>';

            try {
                const response = await fetch(`https://api.openrouteservice.org/v2/directions/driving-car/geojson`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': API_KEY, 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({ coordinates: [points.start, points.end] })
                });
                
                if (!response.ok) throw new Error("API Limit oder Routing Fehler");
                
                const data = await response.json();
                currentTourData = data;
                renderInteractiveTour();
            } catch(e) { 
                res.innerHTML = `<div class="p-10 text-center text-red-500 font-bold">Routing fehlgeschlagen. Bitte API-Key prüfen oder versuche eine kürzere Strecke.</div>`;
            }
        }

        function renderInteractiveTour() {
            const container = document.getElementById('tour-results');
            container.innerHTML = "";
            const days = parseInt(document.getElementById('days-range').value);
            const meals = parseInt(document.getElementById('meal-count').value);

            for(let d=1; d<=days; d++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = "p-6 space-y-4 animate-fade border-b border-white/5";
                dayDiv.innerHTML = `
                    <div class="flex items-center justify-between bg-zinc-900/50 p-4 rounded-2xl border border-white/10">
                        <div class="flex items-center gap-3">
                            <span class="bg-orange-600 text-black font-black px-3 py-1.5 rounded-lg italic text-sm">TAG ${d}</span>
                            <h3 class="font-black uppercase text-xs tracking-widest text-zinc-300">Konfiguration</h3>
                        </div>
                        <button onclick="exportGoogleMaps(${d})" title="Export nach Google Maps" class="bg-white/5 p-2 rounded-xl hover:bg-orange-600 hover:text-black transition-all group">
                            <i data-lucide="map-pin" class="w-4 h-4 group-hover:scale-110 transition-transform"></i>
                        </button>
                    </div>
                `;
                dayDiv.appendChild(createSelectionSection(d, 'sight', 'Sehenswürdigkeit wählen'));
                for(let m=1; m<=meals; m++) {
                    dayDiv.appendChild(createSelectionSection(d, 'restaurant_' + m, `Mahlzeit ${m}: Restaurant`));
                }
                dayDiv.appendChild(createSelectionSection(d, 'hotel', 'Unterkunft für die Nacht'));
                container.appendChild(dayDiv);
            }
            lucide.createIcons();
            if(routeLayer) map.removeLayer(routeLayer);
            routeLayer = L.geoJSON(currentTourData, {style: {color: '#ff9800', weight: 5, opacity: 0.8}}).addTo(map);
            map.fitBounds(routeLayer.getBounds(), { padding: [50, 50] });
        }

        function createSelectionSection(day, typeKey, title) {
            const section = document.createElement('div');
            section.className = "space-y-3";
            section.innerHTML = `<p class="text-[9px] font-black text-zinc-500 uppercase tracking-widest ml-1">${title}</p>`;
            const baseType = typeKey.startsWith('restaurant') ? 'restaurant' : typeKey;
            const options = MOCK_OPTIONS[baseType];
            const grid = document.createElement('div');
            grid.className = "grid grid-cols-1 gap-2";

            options.forEach(opt => {
                const card = document.createElement('div');
                const isSelected = selections[day + typeKey] === opt.id;
                card.className = `selection-card p-4 rounded-xl bg-zinc-900/80 border border-white/5 hover:border-orange-500/50 ${isSelected ? 'selected shadow-lg shadow-orange-900/10' : ''}`;
                card.onclick = () => {
                    selections[day + typeKey] = opt.id;
                    renderInteractiveTour(); 
                };
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="space-y-1">
                            <p class="text-[11px] font-black uppercase text-white">${opt.name}</p>
                            <p class="text-[9px] text-zinc-500 font-medium">${opt.addr}</p>
                        </div>
                        <div class="text-right flex flex-col items-end">
                            <p class="text-orange-500 text-[10px] font-bold">${'★'.repeat(Math.floor(opt.rating))}</p>
                            <p class="text-[9px] font-black text-zinc-400 mt-1">${opt.price} • ${opt.type}</p>
                        </div>
                    </div>
                    ${opt.avail ? `<div class="mt-2 pt-2 border-t border-white/5 flex items-center gap-1.5">
                        <div class="w-1.5 h-1.5 rounded-full bg-green-500"></div>
                        <p class="text-[9px] font-bold text-green-500 uppercase italic">${opt.avail}</p>
                    </div>` : ''}
                `;
                grid.appendChild(card);
            });
            section.appendChild(grid);
            return section;
        }

        function exportGoogleMaps(day) {
            const hId = selections[day + 'hotel'];
            const r1Id = selections[day + 'restaurant_1'];
            const r2Id = selections[day + 'restaurant_2'];
            const sId = selections[day + 'sight'];
            const hotel = MOCK_OPTIONS.hotel.find(h => h.id === hId);
            const r1 = MOCK_OPTIONS.restaurant.find(r => r.id === r1Id);
            const r2 = MOCK_OPTIONS.restaurant.find(r => r.id === r2Id);
            const sight = MOCK_OPTIONS.sight.find(s => s.id === sId);
            let url = "https://www.google.com/maps/dir/";
            url += encodeURIComponent(points.sName) + "/";
            if(sight) url += encodeURIComponent(sight.name + ", " + sight.addr) + "/";
            if(r1) url += encodeURIComponent(r1.name + ", " + r1.addr) + "/";
            if(r2) url += encodeURIComponent(r2.name + ", " + r2.addr) + "/";
            if(hotel) url += encodeURIComponent(hotel.name + ", " + hotel.addr) + "/";
            window.open(url, '_blank');
        }

        function searchLoc(el, resId) {
            clearTimeout(searchTimeout);
            const query = el.value.trim();
            const div = document.getElementById(resId);
            if(query.length < 2) {
                div.classList.add('hidden');
                return;
            }
            searchTimeout = setTimeout(async () => {
                try {
                    // Nominatim verlangt einen User-Agent
                    const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5`, {
                        headers: { 
                            'Accept-Language': 'de',
                            'User-Agent': 'RidePlanPro/1.0'
                        }
                    });
                    if (!response.ok) throw new Error("Network issues");
                    const data = await response.json();
                    if (data.length > 0) {
                        showResults(div, data.map(i => ({
                            name: i.display_name,
                            lat: i.lat,
                            lon: i.lon
                        })), resId);
                    } else {
                        throw new Error("No results");
                    }
                } catch (err) {
                    const filtered = FALLBACK_LOCATIONS.filter(l => 
                        l.name.toLowerCase().includes(query.toLowerCase())
                    );
                    showResults(div, filtered, resId);
                }
            }, 500);
        }

        function showResults(div, results, resId) {
            if (results.length === 0) {
                div.innerHTML = `<div class="p-3 text-xs text-zinc-500">Keine Orte gefunden</div>`;
            } else {
                div.innerHTML = results.map(i => `
                    <div onclick="selectLoc('${resId}', '${i.name.split(',')[0]}', [${i.lat},${i.lon}])" class="p-3 text-xs border-b border-white/5 hover:bg-orange-600 hover:text-black cursor-pointer transition-colors">
                        ${i.name}
                    </div>
                `).join('');
            }
            div.classList.remove('hidden');
        }

        function selectLoc(resId, name, coords) {
            const isStart = resId.includes('start');
            points[isStart ? 'start' : 'end'] = [parseFloat(coords[1]), parseFloat(coords[0])];
            points[isStart ? 'sName' : 'eName'] = name;
            document.getElementById(isStart ? 'start-input' : 'end-input').value = name;
            document.getElementById(resId).classList.add('hidden');
            L.marker([coords[0], coords[1]]).addTo(map)
                .bindPopup(name).openPopup();
            map.setView([coords[0], coords[1]], 10);
        }

        function switchTab(t) {
            document.getElementById('tab-plan').classList.toggle('active', t==='plan');
            document.getElementById('tab-detail').classList.toggle('active', t==='detail');
            document.getElementById('panel-plan').classList.toggle('hidden', t!=='plan');
            document.getElementById('panel-detail').classList.toggle('hidden', t!=='detail');
        }

        window.onload = init;
    </script>
</body>
</html>
