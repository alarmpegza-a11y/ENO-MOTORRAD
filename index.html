<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RidePlan Pro | Cloud Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDBsPnNY8cQ3Mt2gwKf3ovjGV9lj5MQdFo",
            authDomain: "eno-motorrad.firebaseapp.com",
            projectId: "eno-motorrad",
            storageBucket: "eno-motorrad.firebasestorage.app",
            messagingSenderId: "759776073053",
            appId: "1:759776073053:web:74b39de61e6730e12f84b4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'eno-motorrad-web';

        window.fb = { 
            auth, db, appId, doc, setDoc, getDoc, collection, 
            onSnapshot, query, addDoc, deleteDoc, 
            signInAnonymously, signInWithCustomToken, onAuthStateChanged 
        };
    </script>

    <style>
        :root { --biker-orange: #ff9800; --biker-dark: #09090b; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: ui-sans-serif, system-ui, sans-serif; color-scheme: dark; }
        
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; }
        .leaflet-tile-pane { filter: brightness(0.6) contrast(1.2) saturate(0.6); }

        .floating-sidebar {
            position: absolute;
            top: 20px;
            left: 20px;
            bottom: 20px;
            width: 420px;
            z-index: 1000;
            background: rgba(12, 12, 14, 0.9);
            backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (max-width: 640px) {
            .floating-sidebar { top: 10px; left: 10px; right: 10px; width: auto; bottom: 10px; }
            .sidebar-collapsed { transform: translateY(calc(100% - 60px)); }
            .collapse-btn { right: 20px !important; top: -50px !important; transform: rotate(90deg); }
        }

        .sidebar-collapsed { transform: translateX(-440px); }

        .collapse-btn {
            position: absolute;
            right: -50px;
            top: 20px;
            width: 40px;
            height: 40px;
            background: var(--biker-orange);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 4px 15px rgba(255,152,0,0.3);
            z-index: 1001;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,152,0,0.3); border-radius: 10px; }
        
        .tab-btn.active { color: var(--biker-orange); border-bottom: 2px solid var(--biker-orange); }
        
        .waypoint-badge { 
            background: var(--biker-orange); color: black; border-radius: 50%; width: 28px; height: 28px; 
            display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; 
            border: 2px solid #000; box-shadow: 0 0 15px rgba(255,152,0,0.6); 
        }

        .search-results {
            position: absolute;
            left: 0;
            right: 0;
            top: 100%;
            z-index: 2000;
            background: #18181b;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            margin-top: 4px;
            max-height: 250px;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn-delete { color: rgba(239, 68, 68, 0.4); transition: all 0.2s; cursor: pointer; }
        .btn-delete:hover { color: #ef4444; transform: scale(1.2); }

        /* Animation für Listen-Items */
        .list-item-anim { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="map"></div>

    <aside id="sidebar" class="floating-sidebar">
        <div class="collapse-btn" onclick="toggleSidebar()">
            <i data-lucide="chevron-left" id="toggle-icon" class="text-black w-5 h-5"></i>
        </div>

        <!-- Header -->
        <div class="p-6 border-b border-white/10">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3">
                    <div class="bg-orange-600 p-2 rounded-lg shadow-inner">
                        <i data-lucide="map-pin" class="text-black w-5 h-5"></i>
                    </div>
                    <h1 class="text-xl font-black tracking-tighter uppercase italic text-white">RidePlan <span class="text-orange-500">Pro</span></h1>
                </div>
                <div id="user-status" class="text-[8px] text-zinc-500 font-mono uppercase tracking-widest text-right">Verbindung...</div>
            </div>

            <div id="status-bar" class="hidden flex items-center gap-3 p-3 bg-orange-500/10 rounded-xl border border-orange-500/20 mb-2">
                <div class="w-3 h-3 border-2 border-orange-500 border-t-transparent rounded-full animate-spin"></div>
                <span id="status-text" class="text-[10px] font-black uppercase text-orange-500 tracking-widest">Berechne...</span>
            </div>
        </div>

        <!-- Navigation -->
        <div class="flex border-b border-white/5 bg-black/20">
            <button onclick="switchTab('plan')" id="tab-plan" class="tab-btn active flex-1 py-4 text-[10px] font-black uppercase tracking-widest text-zinc-400">Route</button>
            <button onclick="switchTab('detail')" id="tab-detail" class="tab-btn flex-1 py-4 text-[10px] font-black uppercase tracking-widest text-zinc-400">Entdeckungen</button>
            <button onclick="switchTab('projects')" id="tab-projects" class="tab-btn flex-1 py-4 text-[10px] font-black uppercase tracking-widest text-zinc-400">Projekte</button>
        </div>

        <!-- Content Area -->
        <div class="flex-1 overflow-y-auto custom-scrollbar p-6">
            
            <!-- Tab: Plan -->
            <div id="panel-plan" class="space-y-6">
                <div class="space-y-4">
                    <div class="relative group">
                        <input id="start-input" oninput="searchLoc(this, 'start-res')" autocomplete="off" type="text" placeholder="Startpunkt..." class="w-full bg-white/5 border border-white/10 rounded-xl p-4 pl-10 text-sm text-white focus:border-orange-500 focus:bg-white/10 outline-none transition-all">
                        <i data-lucide="play" class="absolute left-3 top-4 w-4 h-4 text-green-500"></i>
                        <div id="start-res" class="search-results hidden custom-scrollbar"></div>
                    </div>
                    <div class="relative group">
                        <input id="end-input" oninput="searchLoc(this, 'end-res')" autocomplete="off" type="text" placeholder="Zielort..." class="w-full bg-white/5 border border-white/10 rounded-xl p-4 pl-10 text-sm text-white focus:border-orange-500 focus:bg-white/10 outline-none transition-all">
                        <i data-lucide="flag" class="absolute left-3 top-4 w-4 h-4 text-red-500"></i>
                        <div id="end-res" class="search-results hidden custom-scrollbar"></div>
                    </div>
                </div>

                <div id="waypoints-list" class="space-y-3 min-h-[50px]">
                    <!-- Waypoints appear here -->
                </div>

                <div class="flex gap-2 pt-2">
                    <button onclick="runAdvancedRouting()" class="flex-1 py-4 bg-orange-600 hover:bg-orange-500 text-black font-black uppercase tracking-widest rounded-xl transition-all shadow-lg active:scale-95 flex items-center justify-center gap-2">
                        <i data-lucide="zap" class="w-4 h-4"></i> Tour berechnen
                    </button>
                    <button id="save-btn" disabled onclick="saveCurrentProject()" class="px-5 bg-zinc-800 hover:bg-zinc-700 text-white rounded-xl transition-all disabled:opacity-20 disabled:cursor-not-allowed border border-white/5">
                        <i data-lucide="save" class="w-5 h-5"></i>
                    </button>
                </div>
                
                <div id="error-message" class="hidden p-4 rounded-xl text-[11px] font-bold border animate-pulse"></div>
            </div>

            <!-- Tab: Details -->
            <div id="panel-detail" class="hidden space-y-6">
                <div id="pois-results" class="space-y-8">
                    <p class="text-center text-zinc-600 text-[10px] py-20 uppercase font-black tracking-widest">Route berechnen für POIs</p>
                </div>
            </div>

            <!-- Tab: Projekte -->
            <div id="panel-projects" class="hidden space-y-4">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="text-[10px] font-black uppercase text-zinc-500 tracking-widest">Cloud Archiv</h3>
                    <span id="proj-count" class="text-[9px] text-orange-500 font-mono">0</span>
                </div>
                <div id="projects-list" class="space-y-3">
                    <p class="text-center text-zinc-600 text-xs py-10">Lade Daten...</p>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="p-4 border-t border-white/10 bg-black/40 rounded-b-3xl">
            <button onclick="downloadGPX()" id="gpx-btn" class="hidden w-full flex items-center justify-center gap-2 bg-zinc-800 hover:bg-zinc-700 text-white py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all border border-white/5">
                <i data-lucide="download" class="w-4 h-4"></i> GPX Export
            </button>
        </div>
    </aside>

    <!-- Overlay Stats -->
    <div id="route-stats" class="hidden absolute top-6 right-6 z-[900] bg-black/90 backdrop-blur-2xl p-6 rounded-3xl border border-white/10 min-w-[260px] shadow-2xl">
        <div class="flex items-center gap-4 mb-4">
            <div class="bg-orange-600 p-3 rounded-xl shadow-lg">
                <i data-lucide="navigation" class="text-black w-5 h-5"></i>
            </div>
            <div>
                <p class="text-[9px] text-zinc-500 uppercase font-black tracking-wider">Distanz</p>
                <p id="stat-dist" class="text-2xl font-black italic text-white">0.0 km</p>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-4 pt-4 border-t border-white/10">
            <div>
                <p class="text-[9px] text-zinc-500 uppercase font-black tracking-wider">Zeit</p>
                <p id="stat-time" class="font-bold text-zinc-200 text-xs">--</p>
            </div>
            <div>
                <p class="text-[9px] text-zinc-500 uppercase font-black tracking-wider">Höhe</p>
                <p id="stat-ele" class="font-bold text-zinc-200 text-xs">--</p>
            </div>
        </div>
    </div>

    <script>
        const ORS_API_KEY = "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImY3NDc2NTk5YTI3MzRiZDRiZjBmYjg4YmE1ZTZiYzgwIiwiaCI6Im11cm11cjY0In0=";
        let map, routeLayer;
        let waypoints = [];
        let fullRouteGeojson = null;
        let currentUser = null;
        let searchTimeout = null;

        async function initAuth() {
            if (!window.fb) { setTimeout(initAuth, 100); return; }
            const { auth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = window.fb;
            
            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                const statusEl = document.getElementById('user-status');
                const saveBtn = document.getElementById('save-btn');
                if (user) {
                    statusEl.innerText = `Online: ${user.uid.substring(0, 6)}`;
                    saveBtn.disabled = false;
                    loadProjects();
                } else { 
                    statusEl.innerText = 'Offline'; 
                    saveBtn.disabled = true;
                }
            });

            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token).catch(() => signInAnonymously(auth));
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) { console.error(e); }
        }

        async function saveCurrentProject() {
            if(!currentUser || waypoints.length < 1) return;
            const name = prompt("Name für diese Tour:", `Ride am ${new Date().toLocaleDateString()}`);
            if(!name) return;

            const { db, appId, collection, addDoc } = window.fb;
            try {
                await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'projects'), {
                    name,
                    waypoints: JSON.parse(JSON.stringify(waypoints)),
                    createdAt: new Date().toISOString()
                });
                showSuccess("Tour gespeichert!");
            } catch(e) { showError("Fehler beim Cloud-Sync."); }
        }

        function loadProjects() {
            if(!currentUser) return;
            const { db, appId, collection, onSnapshot } = window.fb;
            const q = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'projects');
            
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('projects-list');
                const countEl = document.getElementById('proj-count');
                
                if(snapshot.empty) {
                    list.innerHTML = '<p class="text-center text-zinc-600 text-[10px] py-10 uppercase font-bold tracking-widest">Keine Touren vorhanden</p>';
                    countEl.innerText = "0";
                    return;
                }
                
                let docs = [];
                snapshot.forEach(d => docs.push({id: d.id, ...d.data()}));
                docs.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
                countEl.innerText = docs.length;
                
                list.innerHTML = "";
                docs.forEach(data => {
                    const card = document.createElement('div');
                    card.className = "project-card p-4 rounded-2xl cursor-pointer group flex justify-between items-center list-item-anim";
                    card.innerHTML = `
                        <div onclick="restoreProject('${data.id}')" class="flex-1 overflow-hidden pr-2">
                            <p class="text-[11px] font-bold text-white truncate">${data.name}</p>
                            <p class="text-[9px] text-zinc-500 font-mono uppercase tracking-tighter">${data.waypoints.length} Etappen • ${new Date(data.createdAt).toLocaleDateString()}</p>
                        </div>
                        <button onclick="deleteProject('${data.id}', event)" class="btn-delete p-2" title="Löschen">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    `;
                    list.appendChild(card);
                });
                lucide.createIcons();
            }, (err) => console.error(err));
        }

        async function restoreProject(id) {
            if (!currentUser) return;
            const { db, appId, doc, getDoc } = window.fb;
            try {
                const docSnap = await getDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'projects', id));
                if (docSnap.exists()) {
                    waypoints = docSnap.data().waypoints;
                    refreshMapMarkers();
                    if(waypoints.length >= 2) runAdvancedRouting();
                    switchTab('plan');
                }
            } catch(e) { showError("Ladefehler."); }
        }

        async function deleteProject(id, event) {
            if(event) event.stopPropagation();
            if(!currentUser || !confirm("Projekt unwiderruflich löschen?")) return;
            const { db, appId, doc, deleteDoc } = window.fb;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'projects', id));
                showSuccess("Projekt entfernt.");
            } catch (e) { showError("Löschen fehlgeschlagen."); }
        }

        function showSuccess(msg) {
            const errBox = document.getElementById('error-message');
            errBox.innerText = msg;
            errBox.className = "p-4 rounded-xl text-[11px] font-bold border bg-green-900/20 text-green-400 border-green-500/50 block";
            setTimeout(() => errBox.className = "hidden", 3000);
        }

        function showError(msg) {
            const errBox = document.getElementById('error-message');
            errBox.innerText = msg;
            errBox.className = "p-4 rounded-xl text-[11px] font-bold border bg-red-900/20 text-red-400 border-red-500/50 block";
            setTimeout(() => errBox.className = "hidden", 5000);
        }

        function init() {
            lucide.createIcons();
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([47.37, 8.54], 8);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            map.on('contextmenu', (e) => {
                addWaypoint([e.latlng.lng, e.latlng.lat], `Stopp ${waypoints.length + 1}`);
            });
            
            // Klick außerhalb schließt Suche
            document.addEventListener('click', (e) => {
                if(!e.target.closest('.group')) {
                    document.getElementById('start-res').classList.add('hidden');
                    document.getElementById('end-res').classList.add('hidden');
                }
            });

            initAuth();
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const icon = document.getElementById('toggle-icon');
            sidebar.classList.toggle('sidebar-collapsed');
            icon.style.transform = sidebar.classList.contains('sidebar-collapsed') ? 'rotate(180deg)' : 'rotate(0deg)';
        }

        async function searchLoc(el, resId) {
            clearTimeout(searchTimeout);
            const queryText = el.value.trim();
            const div = document.getElementById(resId);
            
            if(queryText.length < 3) { div.classList.add('hidden'); return; }

            searchTimeout = setTimeout(async () => {
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(queryText)}&limit=6`);
                    const data = await res.json();
                    if(data.length === 0) { div.classList.add('hidden'); return; }
                    
                    div.innerHTML = data.map(item => `
                        <div onclick="selectLocation('${resId}', '${item.display_name.split(',')[0]}', [${item.lat}, ${item.lon}])" 
                             class="p-4 text-xs border-b border-white/5 hover:bg-orange-600 hover:text-black cursor-pointer transition-all font-bold text-zinc-300">
                            <div class="truncate">${item.display_name}</div>
                        </div>`).join('');
                    div.classList.remove('hidden');
                } catch(e) { console.error(e); }
            }, 300);
        }

        function selectLocation(resId, name, coords) {
            const isStart = resId.includes('start');
            const pt = [coords[1], coords[0]];
            
            if(isStart) {
                if(waypoints.length > 0 && waypoints[0].isStart) waypoints.shift();
                waypoints.unshift({coords: pt, name, isStart: true});
                document.getElementById('start-input').value = name;
            } else {
                if(waypoints.length > 0 && waypoints[waypoints.length-1].isEnd) waypoints.pop();
                waypoints.push({coords: pt, name, isEnd: true});
                document.getElementById('end-input').value = name;
            }
            
            document.getElementById(resId).classList.add('hidden');
            refreshMapMarkers();
            if(waypoints.length >= 2) runAdvancedRouting();
        }

        function addWaypoint(coords, name) {
            if(waypoints.length >= 2 && waypoints[waypoints.length-1].isEnd) {
                waypoints.splice(waypoints.length - 1, 0, {coords, name});
            } else {
                waypoints.push({coords, name});
            }
            refreshMapMarkers();
            if(waypoints.length >= 2) runAdvancedRouting();
        }

        function refreshMapMarkers() {
            map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });
            waypoints.forEach((wp, i) => {
                const isStart = i === 0 && wp.isStart;
                const isEnd = i === waypoints.length - 1 && wp.isEnd;
                let color = "#ff9800";
                if(isStart) color = "#22c55e";
                if(isEnd) color = "#ef4444";

                L.marker([wp.coords[1], wp.coords[0]], {
                    draggable: true,
                    icon: L.divIcon({
                        className: 'custom-icon',
                        html: `<div class="waypoint-badge" style="background:${color}">${i+1}</div>`,
                        iconSize: [28, 28], iconAnchor: [14, 14]
                    })
                }).addTo(map).on('dragend', (e) => {
                    const pos = e.target.getLatLng();
                    waypoints[i].coords = [pos.lng, pos.lat];
                    runAdvancedRouting();
                });
            });
            updateWaypointsUI();
        }

        function updateWaypointsUI() {
            const list = document.getElementById('waypoints-list');
            list.innerHTML = "";
            waypoints.forEach((wp, i) => {
                const item = document.createElement('div');
                item.className = "list-item-anim";
                let segmentStats = (i > 0 && wp.segment) ? `
                    <div class="ml-6 mb-2 border-l-2 border-orange-500/20 pl-4 py-1">
                        <span class="text-[8px] font-black text-orange-500 bg-orange-500/10 px-2 py-1 rounded-sm uppercase tracking-tighter">
                            +${wp.segment.dist}km • ${wp.segment.time}m
                        </span>
                    </div>` : "";
                item.innerHTML = `${segmentStats}
                    <div class="flex items-center justify-between p-3 bg-white/5 border border-white/5 rounded-2xl group hover:border-white/20 transition-all">
                        <div class="flex items-center gap-3 overflow-hidden">
                            <span class="text-[9px] font-black text-zinc-600 w-4">${i+1}</span>
                            <p class="text-[10px] font-bold text-zinc-300 truncate">${wp.name || 'Wegpunkt'}</p>
                        </div>
                        <button onclick="removeWaypoint(${i})" class="text-zinc-600 hover:text-red-500 p-1"><i data-lucide="x" class="w-3 h-3"></i></button>
                    </div>`;
                list.appendChild(item);
            });
            lucide.createIcons();
        }

        function removeWaypoint(i) {
            waypoints.splice(i, 1);
            refreshMapMarkers();
            if(waypoints.length >= 2) runAdvancedRouting();
            else if(routeLayer) map.removeLayer(routeLayer);
        }

        async function runAdvancedRouting() {
            if(waypoints.length < 2) return;
            const status = document.getElementById('status-bar');
            const statusText = document.getElementById('status-text');
            status.classList.remove('hidden');
            let allCoords = [], totalDist = 0, totalTime = 0, totalEle = 0;
            
            try {
                for(let i = 0; i < waypoints.length - 1; i++) {
                    statusText.innerText = `Route: Segment ${i+1}/${waypoints.length-1}`;
                    const res = await fetch(`https://api.openrouteservice.org/v2/directions/driving-car/geojson`, {
                        method: 'POST',
                        headers: { 'Authorization': ORS_API_KEY, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ coordinates: [waypoints[i].coords, waypoints[i+1].coords], elevation: true })
                    });
                    const data = await res.json();
                    if (!data.features) throw new Error("API Limit oder Route blockiert.");
                    
                    const f = data.features[0];
                    waypoints[i+1].segment = {
                        dist: (f.properties.summary.distance / 1000).toFixed(1),
                        time: Math.round(f.properties.summary.duration / 60)
                    };
                    totalDist += f.properties.summary.distance;
                    totalTime += f.properties.summary.duration;
                    totalEle += (f.properties.ascent || 0);
                    allCoords = [...allCoords, ...f.geometry.coordinates];
                }
                
                fullRouteGeojson = { type: "Feature", geometry: { type: "LineString", coordinates: allCoords } };
                if(routeLayer) map.removeLayer(routeLayer);
                routeLayer = L.geoJSON(fullRouteGeojson, { style: { color: '#ff9800', weight: 6, opacity: 0.9, lineCap: 'round' } }).addTo(map);
                
                document.getElementById('stat-dist').innerText = `${(totalDist / 1000).toFixed(1)} km`;
                document.getElementById('stat-time').innerText = `${Math.floor(totalTime / 3600)}h ${Math.round((totalTime % 3600) / 60)}m`;
                document.getElementById('stat-ele').innerText = `▲ ${Math.round(totalEle)}m`;
                
                map.fitBounds(routeLayer.getBounds(), { padding: [80, 80] });
                document.getElementById('route-stats').classList.remove('hidden');
                document.getElementById('gpx-btn').classList.remove('hidden');
                updateWaypointsUI();
                renderPois();
            } catch(e) {
                showError("Routing fehlgeschlagen. Prüfe die Internetverbindung.");
            } finally { status.classList.add('hidden'); }
        }

        function renderPois() {
            const container = document.getElementById('pois-results');
            container.innerHTML = "";
            waypoints.forEach((wp, i) => {
                const section = document.createElement('div');
                section.className = "space-y-4 list-item-anim";
                section.innerHTML = `
                    <div class="flex items-center gap-3 border-b border-white/10 pb-2">
                        <span class="bg-zinc-800 text-orange-500 font-black w-6 h-6 rounded text-[10px] flex items-center justify-center border border-orange-500/30">${i+1}</span>
                        <h3 class="text-[10px] font-black uppercase italic text-white tracking-widest">${wp.name || 'Wegpunkt'}</h3>
                    </div>
                    <div class="grid gap-2">
                        <div class="poi-card p-4 rounded-2xl bg-white/5 hover:bg-white/10 transition-all border border-white/5">
                            <p class="text-[9px] font-black text-orange-500 uppercase mb-1 tracking-tighter">Empfehlung</p>
                            <p class="text-[11px] font-bold text-white">Biker-Point ${wp.name.split(',')[0]}</p>
                            <div class="flex items-center gap-2 mt-2">
                                <span class="bg-zinc-900 px-2 py-0.5 rounded text-[8px] text-zinc-500 font-bold border border-white/5">GASTRONOMIE</span>
                            </div>
                        </div>
                    </div>`;
                container.appendChild(section);
            });
            lucide.createIcons();
        }

        function switchTab(t) {
            ['plan', 'detail', 'projects'].forEach(tab => {
                document.getElementById(`tab-${tab}`).classList.toggle('active', tab === t);
                document.getElementById(`panel-${tab}`).classList.toggle('hidden', tab !== t);
            });
        }

        function downloadGPX() {
            if(!fullRouteGeojson) return;
            let gpx = `<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1" creator="RidePlan"><trk><name>Tour</name><trkseg>`;
            fullRouteGeojson.geometry.coordinates.forEach(pt => gpx += `<trkpt lat="${pt[1]}" lon="${pt[0]}"></trkpt>`);
            gpx += `</trkseg></trk></gpx>`;
            const blob = new Blob([gpx], { type: 'application/gpx+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = "rideplan_tour.gpx"; a.click();
        }

        window.onload = init;
    </script>
</body>
</html>
