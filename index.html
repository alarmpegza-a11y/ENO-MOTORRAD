<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RidePlan Enes | Motorrad Routenplaner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <style>
        :root { --brand: #ff9800; --bg: #121214; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: sans-serif; background: var(--bg); color: white; }
        
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; }

        .sidebar {
            position: absolute; top: 10px; left: 10px; bottom: 10px; width: 380px;
            z-index: 1000; background: rgba(18, 18, 20, 0.95); backdrop-filter: blur(10px);
            border-radius: 16px; display: flex; flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s ease;
        }
        .sidebar.collapsed { transform: translateX(-395px); }

        .toggle-btn {
            position: absolute; right: -40px; top: 20px; width: 40px; height: 40px;
            background: var(--brand); color: black; display: flex; align-items: center;
            justify-content: center; border-radius: 0 8px 8px 0; cursor: pointer;
        }

        .waypoint-item {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 8px; border-radius: 8px; transition: transform 0.1s;
        }
        .sortable-ghost { opacity: 0.4; background: var(--brand) !important; }

        .search-results {
            position: absolute; left: 0; right: 0; top: 100%; z-index: 1100;
            background: #1a1a1e; border: 1px solid var(--brand); border-radius: 8px;
            max-height: 200px; overflow-y: auto; margin-top: 2px;
        }

        input[type="range"] { accent-color: var(--brand); }
        .btn-primary { background: var(--brand); color: black; font-weight: bold; transition: all 0.2s; }
        .btn-primary:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
        .btn-primary:disabled { background: #333; color: #777; cursor: not-allowed; }

        /* Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        
        /* Karten-Fehlermeldungen unterdrücken */
        .leaflet-error-tile { display: none !important; }

        /* Loading Spinner */
        .spinner {
            animation: rotate 2s linear infinite;
            width: 18px; height: 18px;
        }
        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        /* Drop-Marker Style */
        .custom-marker {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .marker-drop {
            width: 30px;
            height: 30px;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            margin-bottom: 15px; /* Adjust for rotation */
        }
        .marker-label {
            transform: rotate(45deg); /* Counter-rotate text */
            color: white;
            font-size: 10px;
            font-weight: 900;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <aside id="sidebar" class="sidebar">
        <div class="toggle-btn" onclick="toggleSidebar()"><i id="tgl-icon" data-lucide="chevron-left"></i></div>

        <div class="p-4 border-b border-white/10 flex justify-between items-center">
            <div>
                <h1 class="text-lg font-black italic tracking-tighter uppercase">RidePlan <span class="text-orange-500">Enes</span></h1>
                <p class="text-[8px] text-zinc-500 font-bold uppercase tracking-widest">Motorcycle Route Engine</p>
            </div>
            <div class="flex gap-2">
                <button onclick="saveProject()" class="p-2 bg-white/5 rounded hover:bg-white/10"><i data-lucide="save" class="w-4 h-4"></i></button>
                <button onclick="loadProject()" class="p-2 bg-white/5 rounded hover:bg-white/10"><i data-lucide="folder-open" class="w-4 h-4"></i></button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto custom-scroll p-4 space-y-6">
            <!-- Routen-Punkte -->
            <div class="space-y-2">
                <label class="text-[10px] font-bold uppercase text-zinc-500 tracking-wider">Startpunkt</label>
                <div class="relative">
                    <input id="start-input" oninput="doSearch(this, 'start-res')" placeholder="Ort oder Koordinaten..." class="w-full bg-white/5 border border-white/10 rounded-lg p-2.5 pl-9 text-sm outline-none focus:border-orange-500">
                    <i data-lucide="play" class="absolute left-3 top-3 w-4 h-4 text-green-500"></i>
                    <div id="start-res" class="search-results hidden"></div>
                </div>

                <div id="waypoint-list" class="pt-2">
                    <!-- Wegpunkte werden hier eingefügt -->
                </div>

                <button onclick="addWaypoint()" class="w-full py-2 border border-dashed border-white/20 rounded-lg text-[10px] font-bold uppercase text-zinc-400 hover:text-white hover:border-white/40 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="plus" class="w-3 h-3"></i> Wegpunkt hinzufügen
                </button>

                <label class="text-[10px] font-bold uppercase text-zinc-500 tracking-wider block pt-2">Zielpunkt</label>
                <div class="relative">
                    <input id="end-input" oninput="doSearch(this, 'end-res')" placeholder="Ort oder Koordinaten..." class="w-full bg-white/5 border border-white/10 rounded-lg p-2.5 pl-9 text-sm outline-none focus:border-orange-500">
                    <i data-lucide="flag" class="absolute left-3 top-3 w-4 h-4 text-red-500"></i>
                    <div id="end-res" class="search-results hidden"></div>
                </div>
            </div>

            <!-- Optionen -->
            <div class="bg-white/5 p-4 rounded-xl border border-white/5 space-y-4">
                <h3 class="text-[10px] font-black uppercase text-orange-500 tracking-widest">Routing-Profil</h3>
                
                <div>
                    <div class="flex justify-between mb-1">
                        <span class="text-[10px] font-bold text-zinc-400 uppercase">Kurvigkeit</span>
                        <span id="label-curvy" class="text-[10px] font-black text-orange-500">Fast & Curvy</span>
                    </div>
                    <input type="range" id="opt-curvy" min="1" max="4" value="2" oninput="document.getElementById('label-curvy').innerText = ['Schnellstmöglich','Fast & Curvy','Extra Curvy','Extreme Curvy'][this.value-1]" class="w-full">
                </div>

                <div class="flex items-center justify-between">
                    <span class="text-[10px] font-bold text-zinc-400 uppercase">Autobahnen vermeiden</span>
                    <input type="checkbox" id="opt-no-highway" checked class="w-4 h-4 accent-orange-500">
                </div>

                <div>
                    <div class="flex justify-between mb-1">
                        <span class="text-[10px] font-bold text-zinc-400 uppercase">Max. Tagesdistanz</span>
                        <span id="label-km" class="text-[10px] font-black text-orange-500">350 km</span>
                    </div>
                    <input type="range" id="opt-km" min="100" max="800" step="50" value="350" oninput="document.getElementById('label-km').innerText = this.value + ' km'" class="w-full">
                </div>
            </div>

            <div id="route-stats" class="hidden grid grid-cols-2 gap-2">
                <div class="bg-white/5 p-3 rounded-lg border border-white/5 text-center">
                    <div class="text-[8px] uppercase font-bold text-zinc-500">Distanz</div>
                    <div id="stat-dist" class="text-md font-black">0 km</div>
                </div>
                <div class="bg-white/5 p-3 rounded-lg border border-white/5 text-center">
                    <div class="text-[8px] uppercase font-bold text-zinc-500">Fahrzeit</div>
                    <div id="stat-time" class="text-md font-black">0h 0m</div>
                </div>
            </div>
        </div>

        <div class="p-4 bg-black/40 border-t border-white/10 space-y-2">
            <button id="calc-btn" onclick="calculateRoute()" class="btn-primary w-full py-4 rounded-xl shadow-lg flex items-center justify-center gap-2 uppercase tracking-tighter">
                <i id="calc-icon" data-lucide="zap" class="w-5 h-5"></i> <span id="calc-text">🚀 Tour berechnen</span>
            </button>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="exportGPX('route')" class="py-2 bg-zinc-800 hover:bg-zinc-700 text-[10px] font-black uppercase rounded-lg">Route (WP)</button>
                <button onclick="exportGPX('track')" class="py-2 bg-zinc-800 hover:bg-zinc-700 text-[10px] font-black uppercase rounded-lg">Track (Safe)</button>
            </div>
        </div>
    </aside>

    <script>
        const API_KEY = "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImY3NDc2NTk5YTI3MzRiZDRiZjBmYjg4YmE1ZTZiYzgwIiwiaCI6Im11cm11cjY0In0=";
        let map, routeLayer, sortable;
        let startPt = null, endPt = null;
        let waypoints = [];
        let markers = [];
        let searchTimeout;

        function init() {
            lucide.createIcons();
            map = L.map('map', { zoomControl: false }).setView([47.5, 13.5], 7);
            
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap contributors © CARTO'
            }).addTo(map);

            sortable = Sortable.create(document.getElementById('waypoint-list'), {
                animation: 150,
                handle: '.drag-handle',
                onEnd: syncWaypointsFromUI
            });

            map.on('contextmenu', (e) => {
                const wp = { lat: e.latlng.lat, lng: e.latlng.lng, name: `${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}` };
                
                if (startPt) {
                    waypoints.push(wp);
                    autoSortWaypoints();
                } else {
                    waypoints.push(wp);
                    renderWaypoints();
                }
                updateMarkers();
            });
        }

        function getDistance(p1, p2) {
            if (!p1 || !p2) return 999999;
            const rad = Math.PI / 180;
            const dLat = (p2.lat - p1.lat) * rad;
            const dLon = (p2.lng - p1.lng) * rad;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(p1.lat * rad) * Math.cos(p2.lat * rad) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return 12742 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function autoSortWaypoints() {
            if (!startPt) return;
            waypoints.sort((a, b) => {
                if (!a) return 1;
                if (!b) return -1;
                return getDistance(startPt, a) - getDistance(startPt, b);
            });
            renderWaypoints();
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const icon = document.getElementById('tgl-icon');
            const isCol = sb.classList.toggle('collapsed');
            icon.setAttribute('data-lucide', isCol ? 'chevron-right' : 'chevron-left');
            lucide.createIcons();
            setTimeout(() => map.invalidateSize(), 300);
        }

        function parseCoords(str) {
            const m = str.match(/(-?\d+\.?\d*)\s*[,;/\s]\s*(-?\d+\.?\d*)/);
            if (m) {
                const lat = parseFloat(m[1]), lng = parseFloat(m[2]);
                if (lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180) return { lat, lng };
            }
            return null;
        }

        function doSearch(input, resId, index = -1) {
            clearTimeout(searchTimeout);
            const query = input.value.trim();
            const resDiv = document.getElementById(resId);
            if (query.length < 2) { resDiv.classList.add('hidden'); return; }

            const coords = parseCoords(query);

            searchTimeout = setTimeout(async () => {
                let html = "";
                if (coords) {
                    html += `<div onclick="selectLoc('${resId}', '${coords.lat}, ${coords.lng}', ${coords.lat}, ${coords.lng}, ${index})" class="p-3 bg-orange-500/10 hover:bg-orange-500 hover:text-black cursor-pointer text-xs font-black border-b border-orange-500/20">📍 Koordinaten nutzen</div>`;
                }
                try {
                    const r = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&limit=5`);
                    const data = await r.json();
                    html += data.features.map(f => {
                        const p = f.properties;
                        const label = [p.name, p.city, p.country].filter(Boolean).join(', ');
                        const [lon, lat] = f.geometry.coordinates;
                        return `<div onclick="selectLoc('${resId}', '${label}', ${lat}, ${lon}, ${index})" class="p-3 hover:bg-orange-500 hover:text-black cursor-pointer text-xs font-bold border-b border-white/5 truncate">${label}</div>`;
                    }).join('');
                    resDiv.innerHTML = html;
                    resDiv.classList.remove('hidden');
                } catch(e) {}
            }, 300);
        }

        function selectLoc(resId, name, lat, lng, idx) {
            const pt = { lat, lng, name };
            if (resId === 'start-res') { 
                startPt = pt; 
                document.getElementById('start-input').value = name;
                autoSortWaypoints(); 
            }
            else if (resId === 'end-res') { endPt = pt; document.getElementById('end-input').value = name; }
            else { waypoints[idx] = pt; renderWaypoints(); }
            document.querySelectorAll('.search-results').forEach(d => d.classList.add('hidden'));
            updateMarkers();
        }

        function addWaypoint() { waypoints.push(null); renderWaypoints(); }
        function removeWaypoint(idx) { waypoints.splice(idx, 1); renderWaypoints(); updateMarkers(); }

        function renderWaypoints() {
            const container = document.getElementById('waypoint-list');
            container.innerHTML = "";
            waypoints.forEach((wp, i) => {
                const div = document.createElement('div');
                div.className = "waypoint-item p-3 flex items-center gap-3 relative";
                div.dataset.index = i;
                div.innerHTML = `
                    <div class="drag-handle cursor-grab text-zinc-600 hover:text-orange-500"><i data-lucide="grip-vertical" class="w-4 h-4"></i></div>
                    <div class="flex-1 relative">
                        <input oninput="doSearch(this, 'wp-res-${i}', ${i})" value="${wp?wp.name:''}" placeholder="Zwischenziel..." class="w-full bg-black/40 border border-white/5 rounded p-2 text-xs outline-none">
                        <div id="wp-res-${i}" class="search-results hidden"></div>
                    </div>
                    <button onclick="removeWaypoint(${i})" class="text-zinc-600 hover:text-red-500"><i data-lucide="trash" class="w-3.5 h-3.5"></i></button>
                `;
                container.appendChild(div);
            });
            lucide.createIcons();
        }

        function syncWaypointsFromUI() {
            const items = Array.from(document.getElementById('waypoint-list').children);
            const newWps = items.map(el => waypoints[parseInt(el.dataset.index)]);
            waypoints = newWps;
            renderWaypoints();
            updateMarkers();
        }

        function updateMarkers() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            // Helferfunktion für den Drop-Marker
            const createDropIcon = (color, label) => L.divIcon({
                className: 'custom-marker',
                html: `
                    <div class="marker-drop" style="background: ${color};">
                        <span class="marker-label">${label}</span>
                    </div>
                `,
                iconSize: [30, 42],
                iconAnchor: [15, 42]
            });

            if (startPt) {
                const m = L.marker([startPt.lat, startPt.lng], { icon: createDropIcon('#22c55e', 'S'), draggable: true }).addTo(map);
                m.on('dragend', (e) => updatePt('start', -1, e.target.getLatLng()));
                markers.push(m);
            }
            if (endPt) {
                const m = L.marker([endPt.lat, endPt.lng], { icon: createDropIcon('#ef4444', 'Z'), draggable: true }).addTo(map);
                m.on('dragend', (e) => updatePt('end', -1, e.target.getLatLng()));
                markers.push(m);
            }
            waypoints.forEach((wp, i) => {
                if (!wp) return;
                const m = L.marker([wp.lat, wp.lng], { icon: createDropIcon('#ff9800', i+1), draggable: true }).addTo(map);
                m.on('dragend', (e) => updatePt('wp', i, e.target.getLatLng()));
                markers.push(m);
            });
        }

        function updatePt(type, idx, latlng) {
            const name = `${latlng.lat.toFixed(5)}, ${latlng.lng.toFixed(5)}`;
            const pt = { lat: latlng.lat, lng: latlng.lng, name };
            if (type === 'start') { 
                startPt = pt; 
                document.getElementById('start-input').value = name;
                autoSortWaypoints();
            }
            else if (type === 'end') { endPt = pt; document.getElementById('end-input').value = name; }
            else { waypoints[idx] = pt; renderWaypoints(); }
            updateMarkers();
        }

        async function calculateRoute() {
            if (!startPt || !endPt) return;

            const btn = document.getElementById('calc-btn');
            const btnText = document.getElementById('calc-text');
            const btnIcon = document.getElementById('calc-icon');

            btn.disabled = true;
            btnText.innerText = "Berechne Route...";
            btnIcon.innerHTML = `<svg class="spinner" viewBox="0 0 50 50"><circle cx="25" cy="25" r="20" fill="none" stroke="currentColor" stroke-width="5" stroke-dasharray="80, 200" stroke-dashoffset="0" stroke-linecap="round"></circle></svg>`;

            const pts = [[startPt.lng, startPt.lat], ...waypoints.filter(w => w).map(w => [w.lng, w.lat]), [endPt.lng, endPt.lat]];
            const curviness = document.getElementById('opt-curvy').value;
            const avoid = document.getElementById('opt-no-highway').checked ? ["highways"] : [];
            
            const profile = 'driving-car';
            const preference = curviness >= 3 ? 'recommended' : 'fastest';

            try {
                const res = await fetch(`https://api.openrouteservice.org/v2/directions/${profile}/geojson`, {
                    method: 'POST',
                    headers: { 'Authorization': API_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ coordinates: pts, preference: preference, options: { avoid_features: avoid } })
                });
                const data = await res.json();
                
                if (data.error) throw new Error("Routing Fehler");

                if (routeLayer) map.removeLayer(routeLayer);
                routeLayer = L.geoJSON(data, { style: { color: '#ff9800', weight: 5, opacity: 0.8 } }).addTo(map);
                map.fitBounds(routeLayer.getBounds(), { padding: [50, 50] });

                const summary = data.features[0].properties.summary;
                document.getElementById('stat-dist').innerText = `${(summary.distance/1000).toFixed(1)} km`;
                const h = Math.floor(summary.duration/3600);
                const m = Math.round((summary.duration%3600)/60);
                document.getElementById('stat-time').innerText = `${h}h ${m}m`;
                document.getElementById('route-stats').classList.remove('hidden');
                
                window.currentRouteData = data;
                
                btnText.innerText = "🚀 Tour berechnet!";
                setTimeout(() => {
                    btnText.innerText = "🚀 Tour berechnen";
                    btnIcon.setAttribute('data-lucide', 'zap');
                    lucide.createIcons();
                    btn.disabled = false;
                }, 2000);

            } catch(e) { 
                console.error(e);
                btnText.innerText = "Fehler!";
                setTimeout(() => {
                    btnText.innerText = "🚀 Tour berechnen";
                    btnIcon.setAttribute('data-lucide', 'zap');
                    lucide.createIcons();
                    btn.disabled = false;
                }, 2000);
            }
        }

        function exportGPX(type) {
            if (!window.currentRouteData) { alert("Bitte erst Route berechnen!"); return; }
            const coords = window.currentRouteData.features[0].geometry.coordinates;
            let gpx = `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="RidePlanEnes" xmlns="http://www.topografix.com/GPX/1/1">
  <metadata><name>RidePlan Tour</name></metadata>`;

            if (type === 'track') {
                gpx += `\n  <trk><name>RidePlan Track</name><trkseg>`;
                coords.forEach(c => gpx += `\n    <trkpt lat="${c[1]}" lon="${c[0]}"></trkpt>`);
                gpx += `\n  </trkseg></trk>`;
            } else {
                gpx += `\n  <rte><name>RidePlan Route</name>`;
                const viaPoints = [startPt, ...waypoints.filter(w => w), endPt];
                viaPoints.forEach(p => gpx += `\n    <rtept lat="${p.lat}" lon="${p.lng}"><name>${p.name}</name></rtept>`);
                gpx += `\n  </rte>`;
            }
            gpx += `\n</gpx>`;
            
            const blob = new Blob([gpx], { type: 'application/gpx+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Tour_${type}.gpx`;
            a.click();
        }

        function saveProject() {
            const data = { startPt, endPt, waypoints };
            localStorage.setItem('rideplan_project', JSON.stringify(data));
        }

        function loadProject() {
            const raw = localStorage.getItem('rideplan_project');
            if (raw) {
                const data = JSON.parse(raw);
                startPt = data.startPt; endPt = data.endPt; waypoints = data.waypoints;
                document.getElementById('start-input').value = startPt ? startPt.name : '';
                document.getElementById('end-input').value = endPt ? endPt.name : '';
                renderWaypoints();
                updateMarkers();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
